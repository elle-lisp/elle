name: Merge Queue Checks

on:
  merge_group:

concurrency:
  group: merge-queue-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-plugins:
    name: Build Plugin (${{ matrix.plugin }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - arrow
          - crypto
          - csv
          - hash
          - jiff
          - msgpack
          - oxigraph
          - polars
          - protobuf
          - random
          - regex
          - selkie
          - syn
          - tls
          - toml
          - tree-sitter
          - xml
          - yaml
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: plugin-${{ matrix.plugin }}
      - name: Build plugin
        run: cargo build --release -p elle-${{ matrix.plugin }}
      - name: Upload plugin .so
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.plugin }}
          path: target/release/libelle_${{ matrix.plugin }}.so
          retention-days: 1

  check-plugin-list:
    name: Plugin List Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify PLUGINS matches Cargo.toml
        run: make check-plugin-list

  tests:
    name: Elle & Plugin Tests
    needs: build-plugins
    runs-on: ubuntu-latest
    env:
      PROPTEST_CASES: 1
      RUST_TEST_THREADS: 2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GNU parallel and Redis
        run: |
          sudo apt-get update
          sudo apt-get install -y parallel redis-server
          sudo systemctl start redis-server
      - name: Build release binary
        run: cargo build --release -p elle
      - name: Download all plugin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: plugin-*
          path: target/release/
          merge-multiple: true
      - name: Run examples and Elle script tests
        run: make smoke
      - name: Run plugin tests
        run: make plugin-tests

  all-checks:
    name: All Checks Passed
    needs: [build-plugins, check-plugin-list, tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check plugin builds
        if: needs.build-plugins.result == 'failure'
        run: exit 1
      - name: Check plugin list
        if: needs.check-plugin-list.result == 'failure'
        run: exit 1
      - name: Check tests
        if: needs.tests.result == 'failure'
        run: exit 1
      - name: Success
        run: echo "All checks passed"
