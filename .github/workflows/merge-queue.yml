name: Merge Queue Checks

on:
  merge_group:

concurrency:
  group: merge-queue-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  examples:
    name: Examples
    runs-on: ubuntu-latest
    env:
      PROPTEST_CASES: 1
      RUST_TEST_THREADS: 2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GNU parallel
        run: sudo apt-get install -y parallel
      - name: Build release binary
        run: cargo build --release
      - name: Run examples and Elle script tests
        run: make smoke

  plugin-tests:
    name: Plugin Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Restore plugin .so cache
        id: plugin-cache
        uses: actions/cache@v4
        with:
          path: |
            target/release/libelle_glob.so
            target/release/libelle_regex.so
            target/release/libelle_sqlite.so
            target/release/libelle_crypto.so
            target/release/libelle_random.so
            target/release/libelle_selkie.so
            target/release/libelle_oxigraph.so
          key: plugins-so-${{ runner.os }}-${{ hashFiles('plugins/**', 'src/**', 'Cargo.toml', 'Cargo.lock') }}

      - name: Install GNU parallel
        run: sudo apt-get install -y parallel

      - name: Build release binary
        run: cargo build --release -p elle

      - name: Build plugins
        if: steps.plugin-cache.outputs.cache-hit != 'true'
        run: make plugins

      - name: Run plugin tests
        run: make plugin-tests

  all-checks:
    name: All Checks Passed
    needs: [examples, plugin-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check examples
        if: needs.examples.result == 'failure'
        run: exit 1
      - name: Check plugin tests
        if: needs.plugin-tests.result == 'failure'
        run: exit 1
      - name: Success
        run: echo "All checks passed"
