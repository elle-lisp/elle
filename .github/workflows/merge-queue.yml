name: Merge Queue Checks

on:
  merge_group:

concurrency:
  group: merge-queue-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  tests:
    name: Elle Tests
    runs-on: ubuntu-latest
    env:
      PROPTEST_CASES: 1
      RUST_TEST_THREADS: 2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GNU parallel and Redis
        run: |
          sudo apt-get update
          sudo apt-get install -y parallel redis-server
          sudo systemctl start redis-server
      - name: Build release binary
        run: cargo build --release -p elle
      - name: Run smoke tests
        run: make smoke

  all-checks:
    name: All Checks Passed
    needs: [tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check tests
        if: needs.tests.result == 'failure'
        run: exit 1
      - name: Success
        run: echo "All checks passed"
