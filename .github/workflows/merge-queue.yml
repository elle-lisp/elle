name: Merge Queue Checks

on:
  merge_group:

concurrency:
  group: merge-queue-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  examples:
    name: Examples
    runs-on: ubuntu-latest
    env:
      PROPTEST_CASES: 1
      RUST_TEST_THREADS: 2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GNU parallel
        run: sudo apt-get install -y parallel
      - name: Build release binary
        run: cargo build --release
      - name: Run examples and Elle script tests
        run: make smoke

  build-plugins:
    name: Build Plugin (${{ matrix.plugin }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - base64
          - compress
          - crypto
          - csv
          - glob
          - oxigraph
          - random
          - regex
          - selkie
          - semver
          - sqlite
          - syn
          - toml
          - uuid
          - xml
          - yaml
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: plugin-${{ matrix.plugin }}
      - name: Build plugin
        run: cargo build --release -p elle-${{ matrix.plugin }}
      - name: Upload plugin .so
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.plugin }}
          path: target/release/libelle_${{ matrix.plugin }}.so
          retention-days: 1

  plugin-tests:
    name: Plugin Tests
    needs: build-plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GNU parallel
        run: sudo apt-get install -y parallel
      - name: Build release binary
        run: cargo build --release -p elle
      - name: Download all plugin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: plugin-*
          path: target/release/
          merge-multiple: true
      - name: Run plugin tests
        run: make plugin-tests

  all-checks:
    name: All Checks Passed
    needs: [examples, build-plugins, plugin-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check examples
        if: needs.examples.result == 'failure'
        run: exit 1
      - name: Check plugin builds
        if: needs.build-plugins.result == 'failure'
        run: exit 1
      - name: Check plugin tests
        if: needs.plugin-tests.result == 'failure'
        run: exit 1
      - name: Success
        run: echo "All checks passed"
