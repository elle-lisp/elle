name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  merge_group:
  schedule:
    # Weekly toolchain check: Sunday 06:00 UTC
    - cron: '0 6 * * 0'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for source changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.merge_group.base_sha }}"
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '\.(rs|lisp)$|^Cargo\.|^Makefile$|^\.cargo/'; then
            echo "source=true" >> "$GITHUB_OUTPUT"
          else
            echo "source=false" >> "$GITHUB_OUTPUT"
          fi

  test-rust:
    name: Rust Tests
    needs: [changes, examples]
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true' && needs.examples.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit, integration, and VM tests
        run: "cargo test --workspace --verbose -- --skip elle_scripts:: --skip property::"

  test-property:
    name: Property Tests
    needs: [changes, test-rust]
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true' && needs.test-rust.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run property tests
        run: "cargo test --test lib property:: --verbose"
        env:
          # PR: fast feedback (8). Merge queue / push to main: moderate (16).
          # Nightly/weekly runs use 128 via toolchain-check job.
          PROPTEST_CASES: ${{ github.event_name == 'pull_request' && '8' || '16' }}

  fmt:
    name: Rustfmt
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  clippy:
    name: Clippy
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy on workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  audit:
    name: Dependency Audit
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install and run cargo-audit
        run: |
          cargo install cargo-audit
          cargo audit

  examples:
    name: Examples
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
      - name: Test all Lisp examples with release build
        run: |
          ELLE_BIN="./target/release/elle"
          # Try TMPDIR, then TMP, then fallback to /tmp
          TEMP_DIR="${TMPDIR:-${TMP:-/tmp}}/elle-examples-$$"
          mkdir -p "$TEMP_DIR"

          echo "Testing all Lisp examples with release build:"
          echo "=============================================="

          TOTAL=0
          PASSED=0
          FAILED=0

          for example in examples/*.lisp; do
            if [ ! -f "$example" ]; then
              continue
            fi

            TOTAL=$((TOTAL + 1))
            EXAMPLE_NAME=$(basename "$example")

            echo ""
            echo "Running: $EXAMPLE_NAME"
            echo "---"

            OUTPUT_FILE="$TEMP_DIR/output_$EXAMPLE_NAME.txt"
            if timeout 10s "$ELLE_BIN" "$example" > "$OUTPUT_FILE" 2>&1; then
              PASSED=$((PASSED + 1))
              echo "✓ $EXAMPLE_NAME PASSED"
              # Show first few lines of output
              head -5 "$OUTPUT_FILE" | sed 's/^/  /'
            else
              FAILED=$((FAILED + 1))
              echo "✗ $EXAMPLE_NAME FAILED"
              # Show error details
              head -10 "$OUTPUT_FILE" | sed 's/^/  /'
              # Don't exit on failure - continue testing all examples
            fi
          done

          # Cleanup
          rm -rf "$TEMP_DIR"

          echo ""
          echo "=============================================="
          echo "Results: $PASSED/$TOTAL passed, $FAILED failed"

           if [ $FAILED -gt 0 ]; then
             echo "✗ Some examples failed"
             exit 1
           else
             echo "✓ All examples passed"
            fi
      - name: Run Elle script tests
        run: |
          echo "Running Elle script tests:"
          echo "=========================="
          for f in tests/elle/*.lisp; do
            echo "  $f"
            ./target/release/elle "$f" || exit 1
          done
          echo "✓ All Elle script tests passed"

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install graphviz
        run: sudo apt-get install -y graphviz
      - name: Build Elle
        run: cargo build --release
      - name: Generate pipeline diagram
        run: make docs
      - name: Generate Rust API docs
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"
      - name: Generate Elle documentation site
        run: ./target/release/elle elle-doc/generate.lisp
      - name: Merge documentation
        run: |
          # Move Rust API docs under site/api/
          mv target/doc site/api
          # Create robots.txt
          cat > site/robots.txt << 'EOF'
          User-agent: *
          Allow: /
          Sitemap: https://elle-lisp.github.io/elle/sitemap.txt
          EOF
          # Create sitemap
          cat > site/sitemap.txt << 'EOF'
          https://elle-lisp.github.io/elle/
          https://elle-lisp.github.io/elle/getting-started.html
          https://elle-lisp.github.io/elle/language-guide.html
          https://elle-lisp.github.io/elle/stdlib-reference.html
          https://elle-lisp.github.io/elle/examples.html
          https://elle-lisp.github.io/elle/api/elle/
          https://elle-lisp.github.io/elle/api/elle/vm/
          https://elle-lisp.github.io/elle/api/elle/ffi/
          https://elle-lisp.github.io/elle/api/elle/compiler/
          EOF
      - name: Fetch benchmark data
        run: |
          git fetch origin gh-pages --depth=1 || true
          mkdir -p site/dev/bench
          git show origin/gh-pages:dev/bench/data.js > site/dev/bench/data.js 2>/dev/null || echo '{}' > site/dev/bench/data.js
          git show origin/gh-pages:dev/bench/index.html > site/dev/bench/index.html 2>/dev/null || true
      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: site/
          retention-days: 30

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: docs
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download documentation
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: ./doc-build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./doc-build
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'performance')
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install gnuplot
        run: sudo apt-get install -y gnuplot
      - name: Run Criterion benchmarks
        run: |
          cargo bench --bench benchmarks -- \
            --sample-size 10 --warm-up-time 1 --measurement-time 2 \
            --nresamples 100 --noplot --output-format bencher \
            'parsing|symbol_interning|compilation|vm_execution|conditionals|end_to_end' \
            | tee output.txt
        env:
          RAYON_NUM_THREADS: 1
      - name: Post benchmark comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo '## Benchmark Results'
            echo ''
            echo '```'
            cat output.txt
            echo '```'
            echo ''
            echo "_Commit: ${{ github.event.pull_request.head.sha }}_"
          } > comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.md
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Elle Benchmarks
          tool: cargo
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: '120%'
          fail-on-alert: true
          auto-push: false

  benchmarks-publish:
    name: Publish Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install gnuplot
        run: sudo apt-get install -y gnuplot
      - name: Run Criterion benchmarks
        run: cargo bench --bench benchmarks -- --sample-size 10 --warm-up-time 1 --measurement-time 2 --nresamples 100 --output-format bencher | tee output.txt
        env:
          RAYON_NUM_THREADS: 1
      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-reports
          path: target/criterion/
          retention-days: 30
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Elle Benchmarks
          tool: cargo
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          benchmark-data-dir-path: dev/bench
          gh-pages-branch: gh-pages

  # Weekly toolchain compatibility check
  toolchain-check:
    name: Toolchain Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    strategy:
      matrix:
        rust: [beta, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Run all workspace tests
        run: cargo test --workspace --verbose
        env:
          # Weekly scheduled run: thorough coverage across beta/nightly toolchains.
          PROPTEST_CASES: 128

  all-checks:
    name: All Checks Passed
    needs: [changes, test-rust, test-property, fmt, clippy, examples, docs, benchmarks]
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'merge_group')
    steps:
      - name: Check test-rust
        if: needs.test-rust.result == 'failure'
        run: exit 1
      - name: Check test-property
        if: needs.test-property.result == 'failure'
        run: exit 1
      - name: Check fmt
        if: needs.fmt.result == 'failure'
        run: exit 1
      - name: Check clippy
        if: needs.clippy.result == 'failure'
        run: exit 1
      - name: Check examples
        if: needs.examples.result == 'failure'
        run: exit 1
      - name: Check docs
        if: needs.docs.result == 'failure'
        run: exit 1
      - name: Check benchmarks
        if: needs.benchmarks.result == 'failure'
        run: exit 1
      - name: Check changes detection
        if: needs.changes.result == 'failure'
        run: exit 1
      - name: Success
        run: echo "All checks passed"
