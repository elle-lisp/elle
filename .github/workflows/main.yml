name: Main Branch

on:
  push:
    branches: [ main ]

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install and run cargo-audit
        run: |
          cargo install cargo-audit
          cargo audit

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - name: Build Elle
        run: cargo build --release
      - name: Generate pipeline diagram
        run: make docs
      - name: Generate Rust API docs
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"
      - name: Generate Elle documentation site
        run: ./target/release/elle demos/docgen/generate.lisp
      - name: Merge documentation
        run: |
          # Move Rust API docs under site/api/
          mv target/doc site/api
          # Create robots.txt
          cat > site/robots.txt << 'EOF'
          User-agent: *
          Allow: /
          Sitemap: https://elle-lisp.github.io/elle/sitemap.txt
          EOF
          # Create sitemap
          cat > site/sitemap.txt << 'EOF'
          https://elle-lisp.github.io/elle/
          https://elle-lisp.github.io/elle/getting-started.html
          https://elle-lisp.github.io/elle/language-guide.html
          https://elle-lisp.github.io/elle/stdlib-reference.html
          https://elle-lisp.github.io/elle/examples.html
          https://elle-lisp.github.io/elle/api/elle/
          https://elle-lisp.github.io/elle/api/elle/vm/
          https://elle-lisp.github.io/elle/api/elle/ffi/
          https://elle-lisp.github.io/elle/api/elle/compiler/
          EOF
      - name: Fetch benchmark data
        run: |
          git fetch origin gh-pages --depth=1 || true
          mkdir -p site/dev/bench
          git show origin/gh-pages:dev/bench/data.js > site/dev/bench/data.js 2>/dev/null || echo '{}' > site/dev/bench/data.js
          git show origin/gh-pages:dev/bench/index.html > site/dev/bench/index.html 2>/dev/null || true
      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: site/
          retention-days: 30

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download documentation
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: ./doc-build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./doc-build
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
