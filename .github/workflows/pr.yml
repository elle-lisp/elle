name: PR

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for source changes
        id: filter
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '\.(rs|lisp)$|^Cargo\.|^Makefile$|^\.cargo/'; then
            echo "source=true" >> "$GITHUB_OUTPUT"
          else
            echo "source=false" >> "$GITHUB_OUTPUT"
          fi

  qa:
    name: QA (fmt, clippy, doc)
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    env:
      MLIR_SYS_220_PREFIX: /usr/lib/llvm-22
      TABLEGEN_220_PREFIX: /usr/lib/llvm-22
      LIBCLANG_PATH: /usr/lib/llvm-22/lib
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install LLVM 22 (for mlir feature)
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-22-dev libpolly-22-dev mlir-22-tools libmlir-22-dev libclang-22-dev clang-22
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Run clippy on workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Check documentation
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  tests:
    name: Elle Tests
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GNU parallel and Redis
        run: |
          sudo apt-get update
          sudo apt-get install -y parallel redis-server libsqlite3-dev libz-dev libzstd-dev libgit2-dev
          sudo systemctl start redis-server
      - name: Release Build
        run: cargo build --release -p elle
      - name: make smoke
        run: make smoke

  tests-combined:
    name: Rust Tests
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    env:
      PROPTEST_CASES: 16
      RUST_TEST_THREADS: 2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests
        run: cargo test --test '*' -- --skip property
      - name: Run property tests
        run: "cargo test --test lib property::"

  mlir:
    name: MLIR Tests
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    env:
      MLIR_SYS_220_PREFIX: /usr/lib/llvm-22
      TABLEGEN_220_PREFIX: /usr/lib/llvm-22
      LIBCLANG_PATH: /usr/lib/llvm-22/lib
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: mlir
      - name: Install LLVM 22 and GNU parallel
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-22-dev libpolly-22-dev mlir-22-tools libmlir-22-dev libclang-22-dev clang-22 parallel
      - name: MLIR Build
        run: cargo build --release -p elle --features mlir
      - name: Run MLIR and SPIR-V tests
        run: |
          ./target/release/elle tests/elle/mlir.lisp
          ./target/release/elle tests/elle/spirv.lisp
      - name: make smoke
        run: make smoke

  aarch64:
    name: AArch64 Smoke
    needs: changes
    runs-on: ubuntu-24.04-arm
    if: needs.changes.outputs.source == 'true'
    env:
      PROPTEST_CASES: 8
      RUST_TEST_THREADS: 2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aarch64
      - name: Install GNU parallel
        run: |
          sudo apt-get update
          sudo apt-get install -y parallel
      - name: Release Build
        run: cargo build --release -p elle
      - name: make smoke
        run: make smoke
      - name: Run integration tests
        run: cargo test --test '*' -- --skip property
      - name: Run property tests
        run: "cargo test --test lib property::"

  aarch64-noffi:
    name: AArch64 No-Features
    needs: changes
    runs-on: ubuntu-24.04-arm
    if: needs.changes.outputs.source == 'true'
    env:
      PROPTEST_CASES: 8
      RUST_TEST_THREADS: 2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: aarch64-noffi
      - name: Install GNU parallel
        run: |
          sudo apt-get update
          sudo apt-get install -y parallel
      - name: Release Build
        run: cargo build --release --no-default-features -p elle
      - name: make smoke-noffi
        run: make smoke-noffi
      - name: make doctest
        run: make doctest

  android:
    name: Android Cross-Check
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: android
      - name: Configure NDK toolchain
        run: |
          NDK=$(ls -d "$ANDROID_SDK_ROOT/ndk/"* | sort -V | tail -1)
          echo "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"
          echo "CC_aarch64_linux_android=aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=llvm-ar" >> "$GITHUB_ENV"
      - name: Cross-check Android
        run: cargo check --target aarch64-linux-android --no-default-features -p elle

  macos:
    name: macOS Smoke
    needs: changes
    runs-on: macos-latest
    if: needs.changes.outputs.source == 'true'
    env:
      PROPTEST_CASES: 8
      RUST_TEST_THREADS: 2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos
      - name: Install GNU parallel and coreutils
        run: brew install parallel coreutils
      - name: Release Build
        run: cargo build --release -p elle
      - name: make smoke
        run: make smoke
      - name: Run integration tests
        run: cargo test --test '*' -- --skip property
      - name: Run property tests
        run: "cargo test --test lib property::"

  all-checks:
    name: All Checks Passed
    needs: [changes, qa, tests-combined, tests, mlir, aarch64, aarch64-noffi, android, macos]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check QA
        if: needs.qa.result == 'failure'
        run: exit 1
      - name: Check combined tests
        if: needs.tests-combined.result == 'failure'
        run: exit 1
      - name: Check tests
        if: needs.tests.result == 'failure'
        run: exit 1
      - name: Check MLIR
        if: needs.mlir.result == 'failure'
        run: exit 1
      - name: Check aarch64
        if: needs.aarch64.result == 'failure'
        run: exit 1
      - name: Check aarch64-noffi
        if: needs.aarch64-noffi.result == 'failure'
        run: exit 1
      - name: Check Android
        if: needs.android.result == 'failure'
        run: exit 1
      - name: Check macOS
        if: needs.macos.result == 'failure'
        run: exit 1
      - name: Check changes detection
        if: needs.changes.result == 'failure'
        run: exit 1
      - name: Success
        run: echo "All checks passed"
