name: PR

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened, labeled, unlabeled ]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for source changes
        id: filter
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '\.(rs|lisp)$|^Cargo\.|^Makefile$|^\.cargo/'; then
            echo "source=true" >> "$GITHUB_OUTPUT"
          else
            echo "source=false" >> "$GITHUB_OUTPUT"
          fi

  fmt:
    name: Rustfmt
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  clippy:
    name: Clippy
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy on workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  elle-tests:
    name: Elle Tests
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GNU parallel
        run: sudo apt-get install -y parallel
      - name: Build release binary
        run: cargo build --release
      - name: Run examples and Elle script tests
        run: make smoke
      - name: Build plugins and run plugin tests
        run: make plugin-tests

  tests-combined:
    name: Integration & Property Tests
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    env:
      PROPTEST_CASES: 8
      RUST_TEST_THREADS: 2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests
        run: cargo test --test '*' -- --skip property
      - name: Run property tests
        run: "cargo test --test lib property::"

  all-checks:
    name: All Checks Passed
    needs: [changes, fmt, clippy, elle-tests, tests-combined]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check fmt
        if: needs.fmt.result == 'failure'
        run: exit 1
      - name: Check clippy
        if: needs.clippy.result == 'failure'
        run: exit 1
      - name: Check Elle Tests
        if: needs.elle-tests.result == 'failure'
        run: exit 1
      - name: Check combined tests
        if: needs.tests-combined.result == 'failure'
        run: exit 1
      - name: Check changes detection
        if: needs.changes.result == 'failure'
        run: exit 1
      - name: Success
        run: echo "All checks passed"
