name: PR

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened, labeled, unlabeled ]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for source changes
        id: filter
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '\.(rs|lisp)$|^Cargo\.|^Makefile$|^\.cargo/'; then
            echo "source=true" >> "$GITHUB_OUTPUT"
          else
            echo "source=false" >> "$GITHUB_OUTPUT"
          fi

  qa:
    name: QA (fmt, clippy, doc)
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Run clippy on workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Check documentation
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  check-plugin-list:
    name: Plugin List Sync
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Verify PLUGINS matches Cargo.toml
        run: make check-plugin-list

  build-plugins:
    name: Build Plugin (${{ matrix.plugin }})
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - arrow
          - base64
          - clap
          - compress
          - crypto
          - csv
          - git
          - glob
          - hash
          - jiff
          - msgpack
          - oxigraph
          - polars
          - protobuf
          - random
          - regex
          - selkie
          - semver
          - sqlite
          - syn
          - tls
          - toml
          - tree-sitter
          - uuid
          - xml
          - yaml
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: plugin-${{ matrix.plugin }}
      - name: Build plugin
        run: cargo build --release -p elle-${{ matrix.plugin }}
      - name: Upload plugin .so
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.plugin }}
          path: target/release/libelle_${{ matrix.plugin }}.so
          retention-days: 1

  tests:
    name: Elle Tests
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GNU parallel and Redis
        run: |
          sudo apt-get update
          sudo apt-get install -y parallel redis-server
          sudo systemctl start redis-server
      - name: Build release binary
        run: cargo build --release -p elle
      - name: Run examples and Elle script tests
        run: make smoke

  plugin-tests:
    name: Plugin Tests
    needs: [changes, build-plugins]
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p elle
      - name: Download all plugin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: plugin-*
          path: target/release/
          merge-multiple: true
      - name: Run plugin tests
        run: make plugin-tests

  tests-combined:
    name: Integration & Property Tests
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    env:
      PROPTEST_CASES: 8
      RUST_TEST_THREADS: 2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests
        run: cargo test --test '*' -- --skip property
      - name: Run property tests
        run: "cargo test --test lib property::"

  all-checks:
    name: All Checks Passed
    needs: [changes, qa, check-plugin-list, tests-combined, build-plugins, tests, plugin-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check QA
        if: needs.qa.result == 'failure'
        run: exit 1
      - name: Check plugin list
        if: needs.check-plugin-list.result == 'failure'
        run: exit 1
      - name: Check combined tests
        if: needs.tests-combined.result == 'failure'
        run: exit 1
      - name: Check plugin builds
        if: needs.build-plugins.result == 'failure'
        run: exit 1
      - name: Check tests
        if: needs.tests.result == 'failure'
        run: exit 1
      - name: Check plugin tests
        if: needs.plugin-tests.result == 'failure'
        run: exit 1
      - name: Check changes detection
        if: needs.changes.result == 'failure'
        run: exit 1
      - name: Success
        run: echo "All checks passed"
