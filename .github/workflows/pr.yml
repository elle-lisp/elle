name: PR

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened, labeled, unlabeled ]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for source changes
        id: filter
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '\.(rs|lisp)$|^Cargo\.|^Makefile$|^\.cargo/'; then
            echo "source=true" >> "$GITHUB_OUTPUT"
          else
            echo "source=false" >> "$GITHUB_OUTPUT"
          fi

  qa:
    name: QA (fmt, clippy, doc)
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Run clippy on workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Check documentation
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  elle-tests:
    name: Elle Tests
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GNU parallel
        run: sudo apt-get install -y parallel
      - name: Build release binary
        run: cargo build --release
      - name: Run examples and Elle script tests
        run: make smoke

  plugin-tests:
    name: Plugin Tests
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Restore plugin .so cache
        id: plugin-cache
        uses: actions/cache@v4
        with:
          path: |
            target/release/libelle_glob.so
            target/release/libelle_regex.so
            target/release/libelle_sqlite.so
            target/release/libelle_crypto.so
            target/release/libelle_random.so
            target/release/libelle_selkie.so
            target/release/libelle_oxigraph.so
          key: plugins-so-${{ runner.os }}-${{ hashFiles('plugins/**', 'src/**', 'Cargo.toml', 'Cargo.lock') }}

      - name: Install GNU parallel
        run: sudo apt-get install -y parallel

      - name: Build release binary
        run: cargo build --release -p elle

      - name: Build plugins
        if: steps.plugin-cache.outputs.cache-hit != 'true'
        run: make plugins

      - name: Run plugin tests
        run: make plugin-tests

  tests-combined:
    name: Integration & Property Tests
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.source == 'true'
    env:
      PROPTEST_CASES: 8
      RUST_TEST_THREADS: 2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests
        run: cargo test --test '*' -- --skip property
      - name: Run property tests
        run: "cargo test --test lib property::"

  all-checks:
    name: All Checks Passed
    needs: [changes, qa, elle-tests, tests-combined, plugin-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check QA
        if: needs.qa.result == 'failure'
        run: exit 1
      - name: Check Elle Tests
        if: needs.elle-tests.result == 'failure'
        run: exit 1
      - name: Check combined tests
        if: needs.tests-combined.result == 'failure'
        run: exit 1
      - name: Check plugin tests
        if: needs.plugin-tests.result == 'failure'
        run: exit 1
      - name: Check changes detection
        if: needs.changes.result == 'failure'
        run: exit 1
      - name: Success
        run: echo "All checks passed"
